<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Atividade 4 - Tabela de Rotina</title>
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
    <!-- tag para tabela -->
    <table>
        <!-- titulo da tabela -->
        <caption>Rotina Semanal - João Vitor Novaes</caption>
        <thead>
            <!-- cabeçalho da tabela -->
            <tr>
                <th>Período</th>
                <th>DOM</th>
                <th>SEG</th>
                <th>TER</th>
                <th>QUA</th>
                <th>QUI</th>
                <th>SEX</th>
                <th>SAB</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <th>MANHÃ</th>
                <td>Livre</td>
                <td colspan="5">Academia / Trabalho (TCS)</td>
                <td>Livre / Jogos</td>
            </tr>
            <tr>
                <th>TARDE</th>
                <td>Social / Namorada / Estudos</td>
                <td colspan="5">Trabalho (TCS)</td>
                <td>Social / Namorada</td>
            </tr>
            <tr>
                <th>NOITE</th>
                <td>Estudos / Projetos pessoais</td>
                <td colspan="5">Faculdade (UniFil)</td>
                <td>Social / Namorada</td>
            </tr>
        </tbody>
    </table>

</body>
</html>
